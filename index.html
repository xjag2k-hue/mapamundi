<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Mapamundi Interactivo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #070b14;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0d1117;
      color: #7ec8f5;
      padding: 14px 24px;
      text-align: center;
      font-size: 1.35rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-bottom: 1px solid #1e3a5f;
      box-shadow: 0 2px 20px rgba(74,158,255,0.15);
      user-select: none;
      flex-shrink: 0;
    }
    header span { font-size: 1.5rem; margin-right: 8px; }

    /* ── MAP ─────────────────────────────────────────── */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg#map {
      width: 100%;
      height: 100%;
      background: #07111e;
      display: block;
      cursor: grab;
    }
    svg#map:active { cursor: grabbing; }

    .graticule { fill: none; stroke: rgba(74,158,255,0.10); stroke-width: 0.5; }

    .country {
      stroke: rgba(0,0,0,0.55);
      stroke-width: 0.35;
      cursor: pointer;
      transition: fill 0.18s;
    }
    .country.selected { stroke: #00d4ff; stroke-width: 1.2; filter: brightness(1.5); }

    .borders { fill: none; stroke: rgba(0,0,0,0.4); stroke-width: 0.5; pointer-events: none; }

    /* ── PANEL flotante dark ─────────────────────────── */
    #info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 215px;
      background: rgba(7,17,30,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #1e3a5f;
      border-radius: 14px;
      box-shadow: 0 0 24px rgba(74,158,255,0.12), 0 6px 24px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 14px 16px;
      gap: 12px;
      z-index: 10;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    #info-panel::-webkit-scrollbar { width: 4px; }
    #info-panel::-webkit-scrollbar-thumb { background: rgba(74,158,255,0.25); border-radius: 4px; }

    .placeholder-icon { font-size: 2.4rem; opacity: 0.3; }
    .placeholder-text { color: #3a6a9a; font-size: 0.9rem; text-align: center; line-height: 1.55; }

    #flag-wrapper {
      width: 187px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 3px 16px rgba(0,0,0,0.6), 0 0 12px rgba(74,158,255,0.15);
      border: 1px solid #1e3a5f;
      display: none;
    }
    #flag-img { width: 100%; display: block; }

    #country-name {
      font-size: 1.15rem;
      font-weight: bold;
      color: #7ec8f5;
      text-align: center;
      line-height: 1.3;
      display: none;
      text-shadow: 0 0 12px rgba(74,158,255,0.4);
    }

    /* ── BOTONES HABLAR ──────────────────────────────── */
    #speak-btn, #lang-btn {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      width: 100%;
      letter-spacing: 0.5px;
    }
    #speak-btn {
      background: transparent;
      color: #4a9eff;
      border: 1px solid #1e3a5f;
      box-shadow: 0 0 8px rgba(74,158,255,0.1);
    }
    #speak-btn:hover { background: rgba(74,158,255,0.1); box-shadow: 0 0 14px rgba(74,158,255,0.3); }
    #speak-btn:active { transform: scale(0.97); }
    #speak-btn.speaking {
      color: #ff6b35;
      border-color: #ff6b35;
      animation: pulse-btn 0.6s ease-in-out infinite alternate;
    }
    #lang-btn {
      background: transparent;
      color: #34d399;
      border: 1px solid #0d3d2a;
      box-shadow: 0 0 8px rgba(52,211,153,0.1);
    }
    #lang-btn:hover { background: rgba(52,211,153,0.1); box-shadow: 0 0 14px rgba(52,211,153,0.3); }
    #lang-btn:active { transform: scale(0.97); }
    #lang-btn.speaking {
      color: #ff6b35;
      border-color: #ff6b35;
      animation: pulse-btn 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-btn {
      from { box-shadow: 0 0 6px rgba(255,107,53,0.3); }
      to   { box-shadow: 0 0 18px rgba(255,107,53,0.7); }
    }
    #speak-icon, #lang-icon { font-size: 1.1rem; }
    #lang-name {
      display: none;
      font-size: 0.78rem;
      color: #34d399;
      text-align: center;
      font-style: italic;
      margin-top: -6px;
      opacity: 0.85;
    }

    /* ── SECCIÓN UNIFORMES ───────────────────────────── */
    #kit-section {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 8px;
      border-top: 1px solid #1e3a5f;
      padding-top: 10px;
    }

    .kit-header {
      font-size: 0.72rem;
      font-weight: bold;
      color: #3a6a9a;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kit-loading {
      font-size: 0.78rem;
      color: #3a6a9a;
      font-style: italic;
    }

    #kit-images {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .kit-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .kit-item img, .kit-item svg {
      height: 78px;
      width: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      transition: transform 0.15s;
    }
    .kit-item img:hover, .kit-item svg:hover { transform: scale(1.08); }

    .kit-label {
      font-size: 0.62rem;
      color: #3a6a9a;
      text-align: center;
      font-style: italic;
    }

    /* ── CONTROLES ───────────────────────────────────── */
    #zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .zoom-btn {
      width: 48px;
      height: 48px;
      background: rgba(7,17,30,0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(74,158,255,0.1);
      user-select: none;
      color: #4a9eff;
      transition: all 0.15s;
    }
    .zoom-btn:hover { background: rgba(74,158,255,0.12); box-shadow: 0 0 14px rgba(74,158,255,0.25); }
    .zoom-btn:active { transform: scale(0.94); }

    /* ── TOOLTIP ─────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: rgba(7,17,30,0.9);
      color: #7ec8f5;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 20;
      border: 1px solid #1e3a5f;
      box-shadow: 0 0 10px rgba(74,158,255,0.15);
    }

    /* ── LOADING ─────────────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(7,17,30,0.95);
      gap: 14px;
      z-index: 30;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid #1e3a5f;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #3a6a9a; font-size: 1rem; letter-spacing: 1px; }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 600px) {
      #info-panel {
        top: auto; bottom: 16px;
        right: 50%; transform: translateX(50%);
        width: calc(100% - 32px); max-width: 380px;
        flex-direction: row; flex-wrap: wrap;
        justify-content: center; padding: 12px;
        max-height: 200px;
      }
      #flag-wrapper { width: 80px; }
      #country-name { font-size: 0.95rem; }
      #zoom-controls { bottom: 215px; }
      .kit-item img, .kit-item svg { height: 60px; }
    }
  </style>
</head>
<body>

<header><span>🌍</span>Mapamundi Interactivo</header>

<div id="map-container">
  <svg id="map"><g id="world-group"></g></svg>

  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando mapa del mundo…</p>
  </div>

  <div id="tooltip"></div>

  <!-- Panel semitransparente flotante -->
  <div id="info-panel">
    <div class="placeholder-icon">👆</div>
    <div class="placeholder-text">Tocá un país<br>en el mapa para<br>ver su bandera</div>
    <div id="flag-wrapper"><img id="flag-img" alt="Bandera"></div>
    <div id="country-name"></div>
    <button id="speak-btn" title="Escuchar nombre del país">
      <span id="speak-icon">🔊</span>
      <span>Escuchar</span>
    </button>
    <button id="lang-btn" title="Idioma oficial">
      <span id="lang-icon">🗣️</span>
      <span>Idioma oficial</span>
    </button>
    <div id="lang-name"></div>
    <!-- Sección de uniformes -->
    <div id="kit-section">
      <div class="kit-header">⚽ Uniformes de Fútbol</div>
      <div id="kit-status" class="kit-loading">Buscando uniformes…</div>
      <div id="kit-images"></div>
    </div>
  </div>

  <!-- Controles de zoom -->
  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-fs"  title="Pantalla completa" style="font-size:1.1rem">⛶</button>
    <button class="zoom-btn" id="btn-in"  title="Acercar">＋</button>
    <button class="zoom-btn" id="btn-out" title="Alejar">－</button>
    <button class="zoom-btn" id="btn-rst" title="Restablecer" style="font-size:1rem">⌂</button>
  </div>
</div>

  "lb":{home:{primary:"#FFFFFF",secondary:"#CC0001",pattern:"solid",collar:"#CC0001"},away:{primary:"#CC0001",secondary:"#FFFFFF",pattern:"solid",collar:"#FFFFFF"}},
  "il":{home:{primary:"#FFFFFF",secondary:"#003087",pattern:"solid",collar:"#003087"},away:{primary:"#003087",secondary:"#FFFFFF",pattern:"solid",collar:"#FFFFFF"}},
  "kp":{home:{primary:"#CC0001",secondary:"#003087",pattern:"solid",collar:"#FFFFFF"},away:{primary:"#FFFFFF",secondary:"#003087",pattern:"solid",collar:"#CC0001"}},
  "bd":{home:{primary:"#006233",secondary:"#CC0001",pattern:"solid",collar:"#006233"},away:{primary:"#FFFFFF",secondary:"#006233",pattern:"solid",collar:"#CC0001"}},

  // OCEANÍA
  "nz":{home:{primary:"#000000",secondary:"#FFFFFF",pattern:"solid",collar:"#FFFFFF"},away:{primary:"#FFFFFF",secondary:"#000000",pattern:"solid",collar:"#CC0001"}},
  "fj":{home:{primary:"#69B3E7",secondary:"#FFFFFF",pattern:"solid",collar:"#003087"},away:{primary:"#FFFFFF",secondary:"#69B3E7",pattern:"solid",collar:"#69B3E7"}},
  "pg":{home:{primary:"#000000",secondary:"#CC0001",pattern:"solid",collar:"#FFD100"},away:{primary:"#CC0001",secondary:"#000000",pattern:"solid",collar:"#FFD100"}},
};

// ─────────────────────────────────────────────────────
//  Generador de SVG de camiseta de fútbol
// ─────────────────────────────────────────────────────
function makeJerseySVG(kit) {
  const {primary, secondary, pattern, collar} = kit;
  const collarColor = collar || primary;
  const uid = Math.random().toString(36).slice(2, 8);

  const bodyPath = "M22,8 C32,2 42,0 50,0 C58,0 68,2 78,8 L82,32 L85,108 L15,108 L18,32 Z";
  const lSleeve  = "M22,8 L3,20 L7,33 L18,32 Z";
  const rSleeve  = "M78,8 L97,20 L93,33 L82,32 Z";
  const collarP  = "M43,0 L50,17 L57,0 C54,4 46,4 43,0 Z";
  const outline  = "M22,8 L3,20 L7,33 L18,32 L15,108 L85,108 L82,32 L93,33 L97,20 L78,8 C68,2 58,0 50,0 C42,0 32,2 22,8 Z";

  let defs = '';
  let bodyFill = primary;

  if (pattern === 'vstripes') {
    defs = `<pattern id="p${uid}" x="0" y="0" width="8" height="10" patternUnits="userSpaceOnUse"><rect width="4" height="10" fill="${primary}"/><rect x="4" width="4" height="10" fill="${secondary}"/></pattern>`;
    bodyFill = `url(#p${uid})`;
  } else if (pattern === 'hstripes') {
    defs = `<pattern id="p${uid}" x="0" y="0" width="100" height="8" patternUnits="userSpaceOnUse"><rect width="100" height="4" fill="${primary}"/><rect y="4" width="100" height="4" fill="${secondary}"/></pattern>`;
    bodyFill = `url(#p${uid})`;
  } else if (pattern === 'checks') {
    defs = `<pattern id="p${uid}" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="4" height="4" fill="${primary}"/><rect x="4" width="4" height="4" fill="${secondary}"/><rect y="4" width="4" height="4" fill="${secondary}"/><rect x="4" y="4" width="4" height="4" fill="${primary}"/></pattern>`;
    bodyFill = `url(#p${uid})`;
  } else if (pattern === 'halves') {
    defs = `<linearGradient id="p${uid}" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="50%" stop-color="${primary}"/><stop offset="50%" stop-color="${secondary}"/></linearGradient>`;
    bodyFill = `url(#p${uid})`;
  } else if (pattern === 'diagonal') {
    defs = `<linearGradient id="p${uid}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="40%" stop-color="${primary}"/><stop offset="40%" stop-color="${secondary}"/></linearGradient>`;
    bodyFill = `url(#p${uid})`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 112" width="68" height="76"><defs>${defs}</defs><path d="${bodyPath}" fill="${bodyFill}"/><path d="${lSleeve}" fill="${secondary}"/><path d="${rSleeve}" fill="${secondary}"/><path d="${outline}" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="${collarP}" fill="${collarColor}" stroke="#2a2a2a" stroke-width="0.8"/></svg>`;
}

function showJerseys(alpha2) {
  kitImages.innerHTML = '';
  const kits = TEAM_KITS[alpha2];
  if (!kits) {
    kitStatus.textContent  = 'Sin datos de uniformes';
    kitStatus.style.display= 'block';
    return;
  }
  kitStatus.style.display = 'none';
  const labels = ['Local', 'Visitante'];
  [kits.home, kits.away].filter(Boolean).forEach((kit, i) => {
    const item = document.createElement('div');
    item.className = 'kit-item';
    item.innerHTML = makeJerseySVG(kit);
    const label = document.createElement('div');
    label.className = 'kit-label';
    label.textContent = labels[i];
    item.appendChild(label);
    kitImages.appendChild(item);
  });
}

// ─────────────────────────────────────────────────────
//  D3 setup
// ─────────────────────────────────────────────────────
const container = document.getElementById('map-container');
const svg       = d3.select('#map');
const g         = d3.select('#world-group');

const W = () => container.clientWidth;
const H = () => container.clientHeight;

function makeProjection() {
  return d3.geoNaturalEarth1().scale(W()/6.4).translate([W()/2, H()/2]);
}
let projection = makeProjection();
let path       = d3.geoPath().projection(projection);

const zoomBehavior = d3.zoom().scaleExtent([1,14])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoomBehavior);
svg.on('dblclick.zoom', null);

// ─────────────────────────────────────────────────────
//  Tooltip
// ─────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(evt, text) {
  tooltip.textContent = text;
  tooltip.style.display = 'block';
  moveTooltip(evt);
}
function moveTooltip(evt) {
  const e = evt.touches ? evt.touches[0] : evt;
  const r = container.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top  - 32;
  if (x + 160 > W()) x -= 180;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ─────────────────────────────────────────────────────
//  Text-to-Speech
// ─────────────────────────────────────────────────────
const synth    = window.speechSynthesis;
const speakBtn = document.getElementById('speak-btn');
const speakIcon= document.getElementById('speak-icon');
let lastSpokenName = '';
let spanishVoice   = null;

function loadVoices() {
  const preferred = ['es-ES','es-MX','es-AR','es-US','es'];
  for (const lang of preferred) {
    const v = synth.getVoices().find(v => v.lang.startsWith(lang));
    if (v) { spanishVoice = v; break; }
  }
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speakName(name) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(name);
  u.lang = 'es-ES'; u.rate = 0.88; u.pitch = 1.05;
  if (spanishVoice) u.voice = spanishVoice;
  speakBtn.classList.add('speaking');
  u.onend = u.onerror = () => speakBtn.classList.remove('speaking');
  synth.speak(u);
}
speakBtn.addEventListener('click', () => { if (lastSpokenName) speakName(lastSpokenName); });

// ─────────────────────────────────────────────────────
//  Botón de idioma oficial
// ─────────────────────────────────────────────────────
const langBtn  = document.getElementById('lang-btn');
const langIcon = document.getElementById('lang-icon');
const langNameEl = document.getElementById('lang-name');
let lastLanguageText = '';

function speakLanguage(lang) {
  if (!synth || !lang) return;
  synth.cancel();
  const hasMultiple = lang.includes(' y ') || lang.includes(',');
  const phrase = hasMultiple
    ? `Los idiomas oficiales son: ${lang}`
    : `El idioma oficial es el ${lang}`;
  const u = new SpeechSynthesisUtterance(phrase);
  u.lang = 'es-ES'; u.rate = 0.88; u.pitch = 1.05;
  if (spanishVoice) u.voice = spanishVoice;
  langBtn.classList.add('speaking');
  u.onend = u.onerror = () => langBtn.classList.remove('speaking');
  synth.speak(u);
}
langBtn.addEventListener('click', () => { if (lastLanguageText) speakLanguage(lastLanguageText); });

// ─────────────────────────────────────────────────────
//  Info panel
// ─────────────────────────────────────────────────────
const flagWrapper     = document.getElementById('flag-wrapper');
const flagImg         = document.getElementById('flag-img');
const countryNameEl   = document.getElementById('country-name');
const placeholderIcon = document.querySelector('.placeholder-icon');
const placeholderText = document.querySelector('.placeholder-text');
const kitSection      = document.getElementById('kit-section');
const kitStatus       = document.getElementById('kit-status');
const kitImages       = document.getElementById('kit-images');

function selectCountry(alpha2, name) {
  placeholderIcon.style.display = 'none';
  placeholderText.style.display = 'none';

  flagImg.src = `https://flagcdn.com/w320/${alpha2}.png`;
  flagImg.alt = `Bandera de ${name}`;
  flagImg.onerror = () => {
    flagImg.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="213"><rect width="320" height="213" fill="%23ccc"/><text x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" font-size="40">🏳️</text></svg>';
  };
  flagWrapper.style.display  = 'block';
  countryNameEl.style.display= 'block';
  speakBtn.style.display     = 'flex';
  countryNameEl.textContent  = name;
  lastSpokenName = name;
  speakName(name);

  // Idioma oficial
  const lang = LANGUAGES[alpha2] || null;
  lastLanguageText = lang || '';
  if (lang) {
    langBtn.style.display   = 'flex';
    langNameEl.style.display= 'block';
    langNameEl.textContent  = lang;
  } else {
    langBtn.style.display   = 'none';
    langNameEl.style.display= 'none';
  }

  // Mostrar sección de kits
  kitSection.style.display = 'flex';
  kitStatus.style.display  = 'none';
  kitImages.innerHTML      = '';
  showJerseys(alpha2);
}

// ─────────────────────────────────────────────────────
//  Cargar mapa
// ─────────────────────────────────────────────────────
let selectedEl = null;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    document.getElementById('loading').style.display = 'none';
    const features = topojson.feature(world, world.objects.countries).features;
    const borders  = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);

    g.append('path').datum({type:'Sphere'}).attr('d', path).attr('fill','#b8ddf0');
    g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d', path);

    g.selectAll('.country').data(features).join('path')
      .attr('class', 'country')
      .attr('d', path)
      .style('fill', d => {
        const a2 = NUM_TO_A2[+d.id];
        return a2 ? getContinentColor(a2).base : CONTINENT_DEFAULT.base;
      })
      .on('pointerover', function(evt, d) {
        const a2 = NUM_TO_A2[+d.id];
        const nm = a2 ? (NAMES[a2] || a2.toUpperCase()) : null;
        if (nm && this !== selectedEl) {
          showTooltip(evt, nm);
          d3.select(this).style('fill', getContinentColor(a2).hover);
        }
      })
      .on('pointermove', function(evt) { if (this !== selectedEl) moveTooltip(evt); })
      .on('pointerout', function(evt, d) {
        hideTooltip();
        if (this !== selectedEl) {
          const a2 = NUM_TO_A2[+d.id];
          d3.select(this).style('fill', a2 ? getContinentColor(a2).base : CONTINENT_DEFAULT.base);
        }
      })
      .on('click', function(evt, d) {
        evt.stopPropagation();
        hideTooltip();
        const a2 = NUM_TO_A2[+d.id];
        const nm = a2 ? (NAMES[a2] || a2.toUpperCase()) : null;
        if (!a2) return;
        // Restaurar color del anterior seleccionado
        if (selectedEl) {
          const prevA2 = NUM_TO_A2[+d3.select(selectedEl).datum().id];
          d3.select(selectedEl)
            .classed('selected', false)
            .style('fill', prevA2 ? getContinentColor(prevA2).base : CONTINENT_DEFAULT.base);
        }
        d3.select(this).classed('selected', true).style('fill', getContinentColor(a2).sel);
        selectedEl = this;
        selectCountry(a2, nm);
      });

    g.append('path').datum(borders).attr('class','borders').attr('d', path);
  })
  .catch(() => {
    document.getElementById('loading').innerHTML =
      '<p style="color:#c00">Error al cargar el mapa.</p>';
  });

// ─────────────────────────────────────────────────────
//  Pantalla completa
// ─────────────────────────────────────────────────────
const btnFs = document.getElementById('btn-fs');
function toggleFullscreen() {
  const el = document.documentElement;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  else       (document.exitFullscreen || document.webkitExitFullscreen).call(document);
}
btnFs.addEventListener('click', toggleFullscreen);
function onFsChange() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  btnFs.textContent = isFs ? '✕' : '⛶';
  btnFs.title = isFs ? 'Salir de pantalla completa' : 'Pantalla completa';
}
document.addEventListener('fullscreenchange',       onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);

// ─────────────────────────────────────────────────────
//  Zoom buttons
// ─────────────────────────────────────────────────────
document.getElementById('btn-in') .addEventListener('click', () => svg.transition().duration(280).call(zoomBehavior.scaleBy, 1.6));
document.getElementById('btn-out').addEventListener('click', () => svg.transition().duration(280).call(zoomBehavior.scaleBy, 0.625));
document.getElementById('btn-rst').addEventListener('click', () => svg.transition().duration(480).call(zoomBehavior.transform, d3.zoomIdentity));

// ─────────────────────────────────────────────────────
//  Resize
// ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  projection = makeProjection();
  path = d3.geoPath().projection(projection);
  g.selectAll('path').attr('d', path);
});
</script>
</body>
