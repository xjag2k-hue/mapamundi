<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Mapamundi Interactivo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #e8f4f8;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a4a7a 0%, #2c6fad 100%);
      color: white;
      padding: 14px 24px;
      text-align: center;
      font-size: 1.35rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      user-select: none;
      flex-shrink: 0;
    }
    header span { font-size: 1.5rem; margin-right: 8px; }

    /* ── MAP ─────────────────────────────────────────── */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg#map {
      width: 100%;
      height: 100%;
      background: #b8ddf0;
      display: block;
      cursor: grab;
    }
    svg#map:active { cursor: grabbing; }

    .graticule { fill: none; stroke: rgba(255,255,255,0.28); stroke-width: 0.4; }

    .country {
      fill: #c9dea8;
      stroke: #7a9a60;
      stroke-width: 0.4;
      cursor: pointer;
      transition: fill 0.15s;
    }
    .country:hover { fill: #a8c97e; }
    .country.selected { fill: #f4a340; stroke: #b86800; stroke-width: 1; }

    .borders { fill: none; stroke: #5a7a45; stroke-width: 0.6; pointer-events: none; }

    /* ── PANEL flotante semitransparente ─────────────── */
    #info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 215px;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.65);
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 14px 16px;
      gap: 12px;
      z-index: 10;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    #info-panel::-webkit-scrollbar { width: 4px; }
    #info-panel::-webkit-scrollbar-thumb { background: rgba(44,111,173,0.3); border-radius: 4px; }

    .placeholder-icon { font-size: 2.4rem; opacity: 0.45; }
    .placeholder-text { color: #4a6a8a; font-size: 0.9rem; text-align: center; line-height: 1.55; }

    #flag-wrapper {
      width: 187px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.7);
      display: none;
    }
    #flag-img { width: 100%; display: block; }

    #country-name {
      font-size: 1.15rem;
      font-weight: bold;
      color: #1a3a5c;
      text-align: center;
      line-height: 1.3;
      display: none;
      text-shadow: 0 1px 3px rgba(255,255,255,0.8);
    }

    /* ── BOTÓN ESCUCHAR ──────────────────────────────── */
    #speak-btn {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: rgba(44,111,173,0.82);
      color: white;
      border: none;
      border-radius: 24px;
      padding: 9px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(44,111,173,0.3);
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      width: 100%;
    }
    #speak-btn:active { background: rgba(26,74,122,0.9); transform: scale(0.97); }
    #speak-btn.speaking {
      background: rgba(224,90,0,0.85);
      animation: pulse-btn 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-btn {
      from { box-shadow: 0 2px 8px rgba(224,90,0,0.3); }
      to   { box-shadow: 0 4px 18px rgba(224,90,0,0.7); }
    }
    #speak-icon { font-size: 1.1rem; }

    /* ── SECCIÓN UNIFORMES ───────────────────────────── */
    #kit-section {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 8px;
      border-top: 1px solid rgba(44,111,173,0.2);
      padding-top: 10px;
    }

    .kit-header {
      font-size: 0.72rem;
      font-weight: bold;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kit-loading {
      font-size: 0.78rem;
      color: #8aa0b8;
      font-style: italic;
    }

    #kit-images {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .kit-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .kit-item img {
      height: 78px;
      width: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      transition: transform 0.15s;
    }
    .kit-item img:hover { transform: scale(1.08); }

    .kit-label {
      font-size: 0.62rem;
      color: #5a7a9a;
      text-align: center;
      font-style: italic;
    }

    /* ── CONTROLES ───────────────────────────────────── */
    #zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .zoom-btn {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.52);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.65);
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      user-select: none;
      color: #1a3a5c;
      transition: background 0.15s;
    }
    .zoom-btn:active { background: rgba(255,255,255,0.82); }

    /* ── TOOLTIP ─────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: rgba(20,40,70,0.82);
      color: white;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 20;
    }

    /* ── LOADING ─────────────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(232,244,248,0.92);
      gap: 14px;
      z-index: 30;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 4px solid #c0d4e8;
      border-top-color: #2c6fad;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #5a7a9a; font-size: 1rem; }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 600px) {
      #info-panel {
        top: auto; bottom: 16px;
        right: 50%; transform: translateX(50%);
        width: calc(100% - 32px); max-width: 380px;
        flex-direction: row; flex-wrap: wrap;
        justify-content: center; padding: 12px;
        max-height: 200px;
      }
      #flag-wrapper { width: 80px; }
      #country-name { font-size: 0.95rem; }
      #zoom-controls { bottom: 215px; }
      .kit-item img { height: 60px; }
    }
  </style>
</head>
<body>

<header><span>🌍</span>Mapamundi Interactivo</header>

<div id="map-container">
  <svg id="map"><g id="world-group"></g></svg>

  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando mapa del mundo…</p>
  </div>

  <div id="tooltip"></div>

  <!-- Panel semitransparente flotante -->
  <div id="info-panel">
    <div class="placeholder-icon">👆</div>
    <div class="placeholder-text">Tocá un país<br>en el mapa para<br>ver su bandera</div>
    <div id="flag-wrapper"><img id="flag-img" alt="Bandera"></div>
    <div id="country-name"></div>
    <button id="speak-btn" title="Escuchar nombre">
      <span id="speak-icon">🔊</span>
      <span>Escuchar</span>
    </button>
    <!-- Sección de uniformes -->
    <div id="kit-section">
      <div class="kit-header">⚽ Uniformes de Fútbol</div>
      <div id="kit-status" class="kit-loading">Buscando uniformes…</div>
      <div id="kit-images"></div>
    </div>
  </div>

  <!-- Controles de zoom -->
  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-fs"  title="Pantalla completa" style="font-size:1.1rem">⛶</button>
    <button class="zoom-btn" id="btn-in"  title="Acercar">＋</button>
    <button class="zoom-btn" id="btn-out" title="Alejar">－</button>
    <button class="zoom-btn" id="btn-rst" title="Restablecer" style="font-size:1rem">⌂</button>
  </div>
</div>

  "tr":"Turkey_national_football_team",
  "tm":"Turkmenistan_national_football_team",
  "ug":"Uganda_national_football_team",
  "ua":"Ukraine_national_football_team",
  "ae":"United_Arab_Emirates_national_football_team",
  "gb":"England_national_football_team",
  "us":"United_States_men%27s_national_soccer_team",
  "uy":"Uruguay_national_football_team",
  "uz":"Uzbekistan_national_football_team",
  "ve":"Venezuela_national_football_team",
  "vn":"Vietnam_national_football_team",
  "ye":"Yemen_national_football_team",
  "zm":"Zambia_national_football_team",
  "zw":"Zimbabwe_national_football_team",
  "sk":"Slovakia_national_football_team",
  "si":"Slovenia_national_football_team",
  "cy":"Cyprus_national_football_team",
  "is":"Iceland_national_football_team",
  "sb":"Solomon_Islands_national_football_team",
  "ec":"Ecuador_national_football_team",
  "gw":"Guinea-Bissau_national_football_team",
  "bo":"Bolivia_national_football_team"
};

const KIT_LABELS = ["Local", "Visitante", "Alternativo", "Portero"];

// Cache para no repetir llamadas a la API
const kitCache = {};

async function fetchKitImages(alpha2) {
  if (kitCache[alpha2] !== undefined) return kitCache[alpha2];

  const page = WIKI_FOOTBALL[alpha2];
  if (!page) { kitCache[alpha2] = null; return null; }

  try {
    // Obtenemos el HTML renderizado de la sección 0 (infobox)
    const r = await fetch(
      `https://en.wikipedia.org/w/api.php?action=parse&page=${page}&prop=text&section=0&format=json&origin=*`
    );
    const d = await r.json();
    if (!d.parse || !d.parse.text) { kitCache[alpha2] = null; return null; }

    // Parseamos el HTML y buscamos img cuyo src apunte a archivos Kit_
    const parser = new DOMParser();
    const doc    = parser.parseFromString(d.parse.text['*'], 'text/html');

    const seen = new Set();
    const all  = [];

    doc.querySelectorAll('img').forEach(img => {
      let src = img.getAttribute('src') || '';
      if (!src.includes('Kit_') && !src.includes('kit_')) return;

      // Hacer URL absoluta
      if (src.startsWith('//')) src = 'https:' + src;
      if (src.startsWith('/'))  src = 'https://en.wikipedia.org' + src;

      // Escalar a 110px de ancho
      src = src.replace(/\/\d+px-/, '/110px-');

      if (!seen.has(src)) { seen.add(src); all.push(src); }
    });

    // Preferir imágenes de cuerpo/camisa; si no hay, usar cualquier Kit_
    const body = all.filter(u => /Kit_body/i.test(u) || /Kit_shirt/i.test(u));
    const result = (body.length ? body : all).slice(0, 4);

    console.log(`[Kit ${alpha2}] total Kit_ imgs: ${all.length}, body: ${body.length}`, result);
    kitCache[alpha2] = result.length ? result : null;
    return kitCache[alpha2];

  } catch(e) {
    console.error(`[Kit ${alpha2}] error:`, e);
    kitCache[alpha2] = null;
    return null;
  }
}

// ─────────────────────────────────────────────────────
//  D3 setup
// ─────────────────────────────────────────────────────
const container = document.getElementById('map-container');
const svg       = d3.select('#map');
const g         = d3.select('#world-group');

const W = () => container.clientWidth;
const H = () => container.clientHeight;

function makeProjection() {
  return d3.geoNaturalEarth1().scale(W()/6.4).translate([W()/2, H()/2]);
}
let projection = makeProjection();
let path       = d3.geoPath().projection(projection);

const zoomBehavior = d3.zoom().scaleExtent([1,14])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoomBehavior);
svg.on('dblclick.zoom', null);

// ─────────────────────────────────────────────────────
//  Tooltip
// ─────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(evt, text) {
  tooltip.textContent = text;
  tooltip.style.display = 'block';
  moveTooltip(evt);
}
function moveTooltip(evt) {
  const e = evt.touches ? evt.touches[0] : evt;
  const r = container.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top  - 32;
  if (x + 160 > W()) x -= 180;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ─────────────────────────────────────────────────────
//  Text-to-Speech
// ─────────────────────────────────────────────────────
const synth    = window.speechSynthesis;
const speakBtn = document.getElementById('speak-btn');
const speakIcon= document.getElementById('speak-icon');
let lastSpokenName = '';
let spanishVoice   = null;

function loadVoices() {
  const preferred = ['es-ES','es-MX','es-AR','es-US','es'];
  for (const lang of preferred) {
    const v = synth.getVoices().find(v => v.lang.startsWith(lang));
    if (v) { spanishVoice = v; break; }
  }
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speakName(name) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(name);
  u.lang = 'es-ES'; u.rate = 0.88; u.pitch = 1.05;
  if (spanishVoice) u.voice = spanishVoice;
  speakBtn.classList.add('speaking');
  u.onend = u.onerror = () => speakBtn.classList.remove('speaking');
  synth.speak(u);
}
speakBtn.addEventListener('click', () => { if (lastSpokenName) speakName(lastSpokenName); });

// ─────────────────────────────────────────────────────
//  Info panel
// ─────────────────────────────────────────────────────
const flagWrapper     = document.getElementById('flag-wrapper');
const flagImg         = document.getElementById('flag-img');
const countryNameEl   = document.getElementById('country-name');
const placeholderIcon = document.querySelector('.placeholder-icon');
const placeholderText = document.querySelector('.placeholder-text');
const kitSection      = document.getElementById('kit-section');
const kitStatus       = document.getElementById('kit-status');
const kitImages       = document.getElementById('kit-images');

function selectCountry(alpha2, name) {
  placeholderIcon.style.display = 'none';
  placeholderText.style.display = 'none';

  flagImg.src = `https://flagcdn.com/w320/${alpha2}.png`;
  flagImg.alt = `Bandera de ${name}`;
  flagImg.onerror = () => {
    flagImg.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="213"><rect width="320" height="213" fill="%23ccc"/><text x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" font-size="40">🏳️</text></svg>';
  };
  flagWrapper.style.display  = 'block';
  countryNameEl.style.display= 'block';
  speakBtn.style.display     = 'flex';
  countryNameEl.textContent  = name;
  lastSpokenName = name;
  speakName(name);

  // Mostrar sección de kits con loading
  kitSection.style.display = 'flex';
  kitStatus.style.display  = 'block';
  kitStatus.textContent    = 'Buscando uniformes…';
  kitImages.innerHTML      = '';

  fetchKitImages(alpha2).then(urls => {
    kitStatus.style.display = 'none';
    if (!urls || !urls.length) {
      kitStatus.textContent  = 'Sin datos de uniformes';
      kitStatus.style.display= 'block';
      return;
    }
    urls.forEach((url, i) => {
      const item  = document.createElement('div');
      item.className = 'kit-item';
      const img   = document.createElement('img');
      img.src     = url;
      img.alt     = KIT_LABELS[i] || `Kit ${i+1}`;
      img.title   = KIT_LABELS[i] || `Kit ${i+1}`;
      const label = document.createElement('div');
      label.className = 'kit-label';
      label.textContent = KIT_LABELS[i] || `Kit ${i+1}`;
      item.appendChild(img);
      item.appendChild(label);
      kitImages.appendChild(item);
    });
  });
}

// ─────────────────────────────────────────────────────
//  Cargar mapa
// ─────────────────────────────────────────────────────
let selectedEl = null;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    document.getElementById('loading').style.display = 'none';
    const features = topojson.feature(world, world.objects.countries).features;
    const borders  = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);

    g.append('path').datum({type:'Sphere'}).attr('d', path).attr('fill','#b8ddf0');
    g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d', path);

    g.selectAll('.country').data(features).join('path')
      .attr('class', 'country')
      .attr('d', path)
      .on('pointerover', function(evt, d) {
        const a2 = NUM_TO_A2[+d.id];
        const nm = a2 ? (NAMES[a2] || a2.toUpperCase()) : null;
        if (nm && this !== selectedEl) showTooltip(evt, nm);
      })
      .on('pointermove', function(evt) { if (this !== selectedEl) moveTooltip(evt); })
      .on('pointerout',  ()  => hideTooltip())
      .on('click', function(evt, d) {
        evt.stopPropagation();
        hideTooltip();
        const a2 = NUM_TO_A2[+d.id];
        const nm = a2 ? (NAMES[a2] || a2.toUpperCase()) : null;
        if (!a2) return;
        if (selectedEl) d3.select(selectedEl).classed('selected', false);
        d3.select(this).classed('selected', true);
        selectedEl = this;
        selectCountry(a2, nm);
      });

    g.append('path').datum(borders).attr('class','borders').attr('d', path);
  })
  .catch(() => {
    document.getElementById('loading').innerHTML =
      '<p style="color:#c00">Error al cargar el mapa.</p>';
  });

// ─────────────────────────────────────────────────────
//  Pantalla completa
// ─────────────────────────────────────────────────────
const btnFs = document.getElementById('btn-fs');
function toggleFullscreen() {
  const el = document.documentElement;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  else       (document.exitFullscreen || document.webkitExitFullscreen).call(document);
}
btnFs.addEventListener('click', toggleFullscreen);
function onFsChange() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  btnFs.textContent = isFs ? '✕' : '⛶';
  btnFs.title = isFs ? 'Salir de pantalla completa' : 'Pantalla completa';
}
document.addEventListener('fullscreenchange',       onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);

// ─────────────────────────────────────────────────────
//  Zoom buttons
// ─────────────────────────────────────────────────────
document.getElementById('btn-in') .addEventListener('click', () => svg.transition().duration(280).call(zoomBehavior.scaleBy, 1.6));
document.getElementById('btn-out').addEventListener('click', () => svg.transition().duration(280).call(zoomBehavior.scaleBy, 0.625));
document.getElementById('btn-rst').addEventListener('click', () => svg.transition().duration(480).call(zoomBehavior.transform, d3.zoomIdentity));

// ─────────────────────────────────────────────────────
//  Resize
// ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  projection = makeProjection();
  path = d3.geoPath().projection(projection);
  g.selectAll('path').attr('d', path);
});
</script>
</body>
</html>

  <style>

    body {

      right: 16px;

    }
  </style>
</head>
<body>

<header><span>🌍</span>Mapamundi Interactivo</header>

<div id="map-container">

  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando mapa del mundo…</p>
  </div>

  <div id="tooltip"></div>

  <!-- Panel semitransparente flotante -->
  <div id="info-panel">
    <div class="placeholder-icon">👆</div>
    <div class="placeholder-text">Tocá un país<br>en el mapa para<br>ver su bandera</div>

    <button class="zoom-btn" id="btn-rst" title="Restablecer" style="font-size:1rem">⌂</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
//  ISO-3166 numeric  →  alpha-2
// ─────────────────────────────────────────────────────
const NUM_TO_A2 = {
  4:"af",8:"al",12:"dz",20:"ad",24:"ao",28:"ag",32:"ar",36:"au",40:"at",
  44:"bs",48:"bh",50:"bd",52:"bb",56:"be",84:"bz",204:"bj",64:"bt",

  414:"kw",417:"kg",418:"la",422:"lb",426:"ls",430:"lr",434:"ly",438:"li",
  440:"lt",442:"lu",807:"mk",450:"mg",454:"mw",458:"my",462:"mv",466:"ml",

  496:"mn",499:"me",504:"ma",508:"mz",516:"na",520:"nr",524:"np",528:"nl",
  554:"nz",558:"ni",562:"ne",566:"ng",578:"no",512:"om",586:"pk",585:"pw",
  275:"ps",591:"pa",598:"pg",600:"py",604:"pe",608:"ph",616:"pl",620:"pt",

const KIT_LABELS = ["Local", "Visitante", "Alternativo", "Portero"];

// Cache para no repetir llamadas a la API
const kitCache = {};

async function fetchKitImages(alpha2) {
  if (kitCache[alpha2] !== undefined) return kitCache[alpha2];

  const page = WIKI_FOOTBALL[alpha2];
  if (!page) { kitCache[alpha2] = null; return null; }

  try {
    // Paso 1: obtener la lista de imágenes de la página
    const r1 = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&titles=${page}&prop=images&imlimit=80&format=json&origin=*`
    );
    const d1 = await r1.json();
    const pg  = Object.values(d1.query.pages)[0];
    if (!pg.images) { kitCache[alpha2] = null; return null; }

    // Filtrar imágenes de camiseta (Kit_body_*)
    const bodyFiles = pg.images
      .map(i => i.title)
      .filter(t => /Kit_body_/i.test(t))
      .slice(0, 4);

    if (!bodyFiles.length) { kitCache[alpha2] = null; return null; }

    // Paso 2: obtener las URLs reales (thumbnail de 100px de ancho)
    const r2 = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(bodyFiles.join('|'))}&prop=imageinfo&iiprop=url&iiurlwidth=100&format=json&origin=*`
    );
    const d2   = await r2.json();
    const urls = Object.values(d2.query.pages)
      .filter(p => p.imageinfo && p.imageinfo[0] && p.imageinfo[0].thumburl)
      .map(p => p.imageinfo[0].thumburl);

    kitCache[alpha2] = urls.length ? urls : null;
    return kitCache[alpha2];

  } catch(e) {
    kitCache[alpha2] = null;
    return null;
  }
}

// ─────────────────────────────────────────────────────
const container = document.getElementById('map-container');
const svg       = d3.select('#map');
const g         = d3.select('#world-group');

const W = () => container.clientWidth;
const H = () => container.clientHeight;

function makeProjection() {
  return d3.geoNaturalEarth1().scale(W()/6.4).translate([W()/2, H()/2]);
}
let projection = makeProjection();
let path       = d3.geoPath().projection(projection);

const zoomBehavior = d3.zoom().scaleExtent([1,14])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoomBehavior);
svg.on('dblclick.zoom', null);

// ─────────────────────────────────────────────────────
//  Tooltip
// ─────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(evt, text) {
  tooltip.textContent = text;
  tooltip.style.display = 'block';
  moveTooltip(evt);
}
function moveTooltip(evt) {
  const e = evt.touches ? evt.touches[0] : evt;
  const r = container.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top  - 32;
  if (x + 160 > W()) x -= 180;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ─────────────────────────────────────────────────────
//  Text-to-Speech
// ─────────────────────────────────────────────────────
const synth    = window.speechSynthesis;
const speakBtn = document.getElementById('speak-btn');
const speakIcon= document.getElementById('speak-icon');
let lastSpokenName = '';
let spanishVoice   = null;

function loadVoices() {
  const preferred = ['es-ES','es-MX','es-AR','es-US','es'];
  for (const lang of preferred) {
    const v = synth.getVoices().find(v => v.lang.startsWith(lang));
    if (v) { spanishVoice = v; break; }
  }
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speakName(name) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(name);
  u.lang = 'es-ES'; u.rate = 0.88; u.pitch = 1.05;
  if (spanishVoice) u.voice = spanishVoice;
  speakBtn.classList.add('speaking');
  u.onend = u.onerror = () => speakBtn.classList.remove('speaking');
  synth.speak(u);
}
speakBtn.addEventListener('click', () => { if (lastSpokenName) speakName(lastSpokenName); });

const flagWrapper     = document.getElementById('flag-wrapper');
const flagImg         = document.getElementById('flag-img');
const countryNameEl   = document.getElementById('country-name');
const placeholderIcon = document.querySelector('.placeholder-icon');
const placeholderText = document.querySelector('.placeholder-text');
const kitSection      = document.getElementById('kit-section');
const kitStatus       = document.getElementById('kit-status');
const kitImages       = document.getElementById('kit-images');

function selectCountry(alpha2, name) {
  placeholderIcon.style.display = 'none';
  placeholderText.style.display = 'none';

  flagImg.src = `https://flagcdn.com/w320/${alpha2}.png`;
  flagImg.alt = `Bandera de ${name}`;
  flagImg.onerror = () => {
    flagImg.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="213"><rect width="320" height="213" fill="%23ccc"/><text x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" font-size="40">🏳️</text></svg>';
  };
  flagWrapper.style.display  = 'block';
  countryNameEl.style.display= 'block';
  speakBtn.style.display     = 'flex';
  countryNameEl.textContent  = name;
  lastSpokenName = name;
  speakName(name);

  // Mostrar sección de kits con loading
  kitSection.style.display = 'flex';
  kitStatus.style.display  = 'block';
  kitStatus.textContent    = 'Buscando uniformes…';
  kitImages.innerHTML      = '';

  fetchKitImages(alpha2).then(urls => {
    kitStatus.style.display = 'none';
    if (!urls || !urls.length) {
      kitStatus.textContent  = 'Sin datos de uniformes';
      kitStatus.style.display= 'block';
      return;
    }
    urls.forEach((url, i) => {
      const item  = document.createElement('div');
      item.className = 'kit-item';
      const img   = document.createElement('img');
      img.src     = url;
      img.alt     = KIT_LABELS[i] || `Kit ${i+1}`;
      img.title   = KIT_LABELS[i] || `Kit ${i+1}`;
      const label = document.createElement('div');
      label.className = 'kit-label';
      label.textContent = KIT_LABELS[i] || `Kit ${i+1}`;
      item.appendChild(img);
      item.appendChild(label);
      kitImages.appendChild(item);
    });
  });
}

// ─────────────────────────────────────────────────────
//  Cargar mapa
// ─────────────────────────────────────────────────────
let selectedEl = null;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    document.getElementById('loading').style.display = 'none';
    const features = topojson.feature(world, world.objects.countries).features;
    const borders  = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);

    g.append('path').datum({type:'Sphere'}).attr('d', path).attr('fill','#b8ddf0');
    g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d', path);

    g.selectAll('.country').data(features).join('path')
      .attr('class', 'country')
      .attr('d', path)
      .on('pointerover', function(evt, d) {
        const a2 = NUM_TO_A2[+d.id];
        const nm = a2 ? (NAMES[a2] || a2.toUpperCase()) : null;
        if (nm && this !== selectedEl) showTooltip(evt, nm);
      })
      .on('pointermove', function(evt) { if (this !== selectedEl) moveTooltip(evt); })
      .on('pointerout',  ()  => hideTooltip())
      .on('click', function(evt, d) {
        evt.stopPropagation();
        hideTooltip();
        const a2 = NUM_TO_A2[+d.id];
        const nm = a2 ? (NAMES[a2] || a2.toUpperCase()) : null;
        if (!a2) return;
        if (selectedEl) d3.select(selectedEl).classed('selected', false);
        d3.select(this).classed('selected', true);
        selectedEl = this;
        selectCountry(a2, nm);
      });

    g.append('path').datum(borders).attr('class','borders').attr('d', path);
  })
  .catch(() => {
    document.getElementById('loading').innerHTML =
      '<p style="color:#c00">Error al cargar el mapa.</p>';
  });

// ─────────────────────────────────────────────────────
//  Pantalla completa
// ─────────────────────────────────────────────────────
const btnFs = document.getElementById('btn-fs');
function toggleFullscreen() {
  const el = document.documentElement;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  else       (document.exitFullscreen || document.webkitExitFullscreen).call(document);
}
btnFs.addEventListener('click', toggleFullscreen);
function onFsChange() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  btnFs.textContent = isFs ? '✕' : '⛶';
  btnFs.title = isFs ? 'Salir de pantalla completa' : 'Pantalla completa';
}
document.addEventListener('fullscreenchange',       onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);

// ─────────────────────────────────────────────────────
//  Zoom buttons
// ─────────────────────────────────────────────────────
document.getElementById('btn-in') .addEventListener('click', () => svg.transition().duration(280).call(zoomBehavior.scaleBy, 1.6));
document.getElementById('btn-out').addEventListener('click', () => svg.transition().duration(280).call(zoomBehavior.scaleBy, 0.625));
document.getElementById('btn-rst').addEventListener('click', () => svg.transition().duration(480).call(zoomBehavior.transform, d3.zoomIdentity));

// ─────────────────────────────────────────────────────
//  Resize
// ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  projection = makeProjection();
  path = d3.geoPath().projection(projection);
  g.selectAll('path').attr('d', path);
});
